<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 95" width="100%" height="95" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    
    .milestone-container {
      display: flex;
      gap: 16px;
      padding: 5px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      flex: 1;
      background: #09090b;
      border: 1px solid #1e1e20;
      border-radius: 8px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #ffffff;
      text-decoration: none;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(15px);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.2s;
    }
    .card:nth-child(2) {
      animation-delay: 0.4s;
    }

    .card:hover {
      border-color: #ffffff;
      background: #0d0d0f;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
    }

    .icon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #141417;
      border-radius: 6px;
      border: 1px solid #27272a;
      transition: border-color 0.3s ease;
    }

    .icon-wrapper svg {
      fill: #e4e4e7;
      transition: fill 0.3s ease;
    }

    .card:hover .icon-wrapper {
      border-color: #ffffff;
    }

    .card:hover .icon-wrapper svg {
      fill: #ffffff;
    }

    .details {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 12px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      color: #e4e4e7;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <foreignObject x="0" y="0" width="800" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" class="milestone-container">
      <!-- Card 1 -->
      <a class="card" href="https://github.com/LuckyBoy587" target="_blank">
        <div class="icon-wrapper">
          <!-- ServiceNow SVG Icon with xmlns -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="490 25 90 80">
            <path d="M533.9,30.1c-21.7,0-39.3,17.5-39.3,39.1c0,10.8,4.4,21.2,12.3,28.6c2.8,2.6,7,2.9,10.1,0.5c9.9-7.4,23.5-7.4,33.4,0c3.1,2.3,7.4,2.1,10.1-0.6c15.7-14.9,16.4-39.7,1.5-55.5C554.6,34.6,544.5,30.2,533.9,30.1 M533.7,88.9c-10.5,0.3-19.2-8-19.5-18.5c0-0.3,0-0.7,0-1c0-10.8,8.7-19.5,19.5-19.5s19.5,8.7,19.5,19.5c0.3,10.5-8,19.2-18.5,19.5C534.3,88.9,534,88.9,533.7,88.9" />
          </svg>
        </div>
        <div class="details">
          <span class="label">Professional</span>
          <span class="value">ServiceNow — Incoming Software Engineer Intern</span>
        </div>
      </a>

      <!-- Card 2 -->
      <a class="card" href="https://leetcode.com/kowshi587" target="_blank">
        <div class="icon-wrapper">
          <!-- LeetCode SVG Icon with xmlns -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
            <path d="M13.483 0a1.374 1.374 0 0 0-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 0 0-1.209 2.104 5.35 5.35 0 0 0-.125.513 5.527 5.527 0 0 0 .062 2.362 5.83 5.83 0 0 0 .349 1.017 5.938 5.938 0 0 0 1.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414 0-1.954l-5.714-5.713a1.374 1.374 0 0 0-1.944 0l-2.072 2.072a1.374 1.374 0 0 0 0 1.944l5.714 5.714c.27.27.625.405.979.405.353 0 .708-.135.979-.405l2.072-2.072c.54-.54.54-1.414 0-1.954L14.444 1.954A1.374 1.374 0 0 0 13.483 0z"/>
          </svg>
        </div>
        <div class="details">
          <span class="label">LeetCode</span>
          <span class="value">1,100+ Problems Solved &amp; Competitive Programming</span>
        </div>
      </a>
    </div>
  </foreignObject>
</svg>
