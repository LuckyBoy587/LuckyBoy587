<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 95" width="100%" height="95" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    
    .milestone-container {
      display: flex;
      gap: 16px;
      padding: 5px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      flex: 1;
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #ffffff;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: translateY(15px);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.2s;
    }
    .card:nth-child(2) {
      animation-delay: 0.4s;
    }

    .card-servicenow {
      background: linear-gradient(#09090b, #09090b) padding-box,
                  linear-gradient(135deg, #62D84E 0%, rgba(30, 30, 32, 0.6) 100%) border-box;
      border: 1px solid transparent;
      box-shadow: 0 4px 15px rgba(98, 216, 78, 0.04);
    }

    .card-leetcode {
      background: linear-gradient(#09090b, #09090b) padding-box,
                  linear-gradient(135deg, #FFA116 0%, rgba(30, 30, 32, 0.6) 100%) border-box;
      border: 1px solid transparent;
      box-shadow: 0 4px 15px rgba(255, 161, 22, 0.04);
    }

    .card-servicenow:hover {
      transform: translateY(-3px);
      background: linear-gradient(#0c0c0f, #0c0c0f) padding-box,
                  linear-gradient(135deg, #62D84E 0%, #ffffff 100%) border-box;
      box-shadow: 0 8px 25px rgba(98, 216, 78, 0.16);
    }

    .card-leetcode:hover {
      transform: translateY(-3px);
      background: linear-gradient(#0c0c0f, #0c0c0f) padding-box,
                  linear-gradient(135deg, #FFA116 0%, #ffffff 100%) border-box;
      box-shadow: 0 8px 25px rgba(255, 161, 22, 0.16);
    }

    .icon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #141417;
      border-radius: 8px;
      border: 1px solid #27272a;
      transition: all 0.3s ease;
    }

    .card-servicenow .icon-wrapper {
      border-color: rgba(98, 216, 78, 0.4);
    }

    .card-leetcode .icon-wrapper {
      border-color: rgba(255, 161, 22, 0.4);
    }

    .card-servicenow:hover .icon-wrapper {
      border-color: #62D84E;
      box-shadow: 0 0 10px rgba(98, 216, 78, 0.2);
    }

    .card-leetcode:hover .icon-wrapper {
      border-color: #FFA116;
      box-shadow: 0 0 10px rgba(255, 161, 22, 0.2);
    }

    .icon-wrapper svg {
      fill: #62D84E;
      transition: fill 0.3s ease;
    }

    .leetcode-logo {
      opacity: 1;
      filter: none;
      transition: opacity 0.3s ease, filter 0.3s ease;
    }

    .details {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 12px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      color: #e4e4e7;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <foreignObject x="0" y="0" width="800" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" class="milestone-container">
      <!-- Card 1 -->
      <a class="card card-servicenow" href="https://github.com/LuckyBoy587" target="_blank">
        <div class="icon-wrapper">
          <!-- ServiceNow SVG Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="490 25 90 80">
            <path d="M533.9,30.1c-21.7,0-39.3,17.5-39.3,39.1c0,10.8,4.4,21.2,12.3,28.6c2.8,2.6,7,2.9,10.1,0.5c9.9-7.4,23.5-7.4,33.4,0c3.1,2.3,7.4,2.1,10.1-0.6c15.7-14.9,16.4-39.7,1.5-55.5C554.6,34.6,544.5,30.2,533.9,30.1 M533.7,88.9c-10.5,0.3-19.2-8-19.5-18.5c0-0.3,0-0.7,0-1c0-10.8,8.7-19.5,19.5-19.5s19.5,8.7,19.5,19.5c0.3,10.5-8,19.2-18.5,19.5C534.3,88.9,534,88.9,533.7,88.9" />
          </svg>
        </div>
        <div class="details">
          <span class="label">Professional</span>
          <span class="value">ServiceNow — Incoming Software Engineer Intern</span>
        </div>
      </a>

      <!-- Card 2 -->
      <a class="card card-leetcode" href="https://leetcode.com/kowshi587" target="_blank">
        <div class="icon-wrapper">
          <!-- LeetCode Base64 PNG Icon -->
          <img class="leetcode-logo" src="data:image/png;base64," width="18" height="18" alt="LeetCode" />
        </div>
        <div class="details">
          <span class="label">LeetCode</span>
          <span class="value">1,100+ Problems Solved &amp; Competitive Programming</span>
        </div>
      </a>
    </div>
  </foreignObject>
</svg>
