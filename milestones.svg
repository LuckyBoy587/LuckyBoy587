<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 95" width="100%" height="95" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    
    .milestone-container {
      display: flex;
      gap: 16px;
      padding: 5px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      flex: 1;
      background: #09090b;
      border: 1px solid #1e1e20;
      border-radius: 8px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #ffffff;
      text-decoration: none;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(15px);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.2s;
    }
    .card:nth-child(2) {
      animation-delay: 0.4s;
    }

    .card:hover {
      border-color: #ffffff;
      background: #0d0d0f;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
    }

    .icon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #141417;
      border-radius: 6px;
      border: 1px solid #27272a;
      transition: border-color 0.3s ease;
    }

    .card:hover .icon-wrapper {
      border-color: #ffffff;
    }

    .details {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 12px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      color: #e4e4e7;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <foreignObject x="0" y="0" width="800" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" class="milestone-container">
      <!-- Card 1 -->
      <a class="card" href="https://github.com/LuckyBoy587" target="_blank">
        <div class="icon-wrapper">
          <!-- Office Icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="22" width="20" height="2"/>
            <path d="M4 22V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v18"/>
            <path d="M9 22v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4"/>
            <path d="M8 6h.01"/>
            <path d="M16 6h.01"/>
            <path d="M8 10h.01"/>
            <path d="M16 10h.01"/>
            <path d="M8 14h.01"/>
            <path d="M16 14h.01"/>
          </svg>
        </div>
        <div class="details">
          <span class="label">Professional</span>
          <span class="value">ServiceNow — Incoming Software Engineer Intern</span>
        </div>
      </a>

      <!-- Card 2 -->
      <a class="card" href="https://leetcode.com/kowshi587" target="_blank">
        <div class="icon-wrapper">
          <!-- Trophy Icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
            <path d="M12 2a6 6 0 0 1 6 6v5a6 6 0 0 1-6 6 6 6 0 0 1-6-6V8a6 6 0 0 1 6-6z"/>
          </svg>
        </div>
        <div class="details">
          <span class="label">LeetCode</span>
          <span class="value">1,100+ Problems Solved &amp; Competitive Programming</span>
        </div>
      </a>
    </div>
  </foreignObject>
</svg>
