<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="100%" height="130" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
    
    .container {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      padding: 10px;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(90deg, #FFFFFF 0%, #A3A3A3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      animation: fadeIn 1s ease-out forwards;
    }

    .subtitle-wrapper {
      display: inline-flex;
      align-items: center;
      font-size: 18px;
      font-weight: 400;
      color: #888888;
      height: 24px;
    }

    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #888888;
      width: 0;
      animation: 
        typing 3s steps(50, end) 1s forwards,
        blink 0.75s step-end infinite;
    }

    .line {
      height: 1px;
      background: linear-gradient(90deg, #ffffff 0%, rgba(255,255,255,0.1) 80%, transparent 100%);
      margin-top: 15px;
      width: 0;
      animation: expandLine 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 490px; }
    }

    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: #888888; }
    }

    @keyframes expandLine {
      to { width: 100%; }
    }
  </style>

  <foreignObject x="0" y="0" width="800" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" class="container">
      <h1 class="title">Hi, I'm Kowshik Baskaran</h1>
      <div class="subtitle-wrapper">
        <span class="typing">Full Stack Software Engineer &amp; Competitive Programmer</span>
      </div>
      <div class="line"></div>
    </div>
  </foreignObject>
</svg>
